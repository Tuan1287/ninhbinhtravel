<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - Trợ lý du lịch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .map-container { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; margin-top: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">Cấu hình API Gemini</h3>
            <input type="password" id="api-input" placeholder="Dán API Key vào đây..." 
                class="w-full p-3 border border-slate-200 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="saveApiKey()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">Bắt đầu</button>
        </div>
    </div>

    <header class="h-16 flex justify-between items-center bg-white border-b px-4 sm:px-8 shrink-0 shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="cursor-pointer" onclick="goHome()">
                <h1 class="text-lg font-bold text-emerald-700 leading-none">Ninh Bình AI</h1>
                <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Smart Guide</span>
            </div>
            <div class="flex items-center bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                <div id="weather-icon" class="text-lg mr-2">⛅</div>
                <div class="text-[11px] leading-tight">
                    <div class="font-bold text-slate-700">Ninh Bình</div>
                    <div id="temp-display" class="text-emerald-600 italic">28°C</div>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-1 sm:space-x-3">
            <button onclick="clearChat()" class="p-2 text-slate-400 hover:text-red-500 transition"><i class="fas fa-trash-alt text-sm"></i></button>
            <button onclick="showApiModal()" class="p-2 text-slate-400 hover:text-amber-500 transition"><i class="fas fa-key text-sm"></i></button>
            <button onclick="toggleLang()" id="langBtn" class="px-3 py-1 border-2 border-emerald-600 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">EN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full relative">
        <div class="px-4 py-3 flex space-x-2 overflow-x-auto no-scrollbar bg-slate-50/80 backdrop-blur shrink-0 z-10">
            <button onclick="askAI('⛰️ Tràng An')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all shadow-emerald-50/50">⛰️ <span class="m-btn">Tràng An</span></button>
            <button onclick="askAI('🧗 Hang Múa')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all shadow-emerald-50/50">🧗 <span class="m-btn">Hang Múa</span></button>
            <button onclick="askAI('🏛️ Hoa Lư')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all shadow-emerald-50/50">🏛️ <span class="m-btn">Hoa Lư</span></button>
            <button onclick="askAI('🍗 Ẩm thực')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all shadow-emerald-50/50">🍖 <span class="m-btn">Ẩm thực</span></button>
            <button onclick="askAI('🏨 Lưu trú')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all shadow-emerald-50/50">🛏️ <span class="m-btn">Lưu trú</span></button>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 pb-28 pt-2">
            <div id="welcome-screen" class="py-10 text-center animate-fade-in">
                <h2 class="text-4xl font-serif font-bold mb-1" id="welcome-text">Chào mừng đến</h2>
                <h2 class="text-4xl font-serif italic text-slate-300 mb-8">Ninh Bình</h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-md mx-auto">
                    <div onclick="askAI(translations[currentLang].sug1)" class="p-5 bg-white border border-slate-100 rounded-2xl cursor-pointer hover:shadow-lg transition-all border-l-4 border-l-emerald-500">
                        <i class="fas fa-route text-emerald-500 mb-2 text-xl"></i>
                        <h3 class="font-bold text-sm" id="sug1-title">Lịch trình tối ưu</h3>
                        <p class="text-[10px] text-slate-400 mt-1">Bao gồm bản đồ dẫn đường</p>
                    </div>
                    <div onclick="askAI(translations[currentLang].sug2)" class="p-5 bg-white border border-slate-100 rounded-2xl cursor-pointer hover:shadow-lg transition-all border-l-4 border-l-orange-500">
                        <i class="fas fa-utensils text-orange-500 mb-2 text-xl"></i>
                        <h3 class="font-bold text-sm" id="sug2-title">Ẩm thực & Quà tặng</h3>
                        <p class="text-[10px] text-slate-400 mt-1">Heo say xỉn, Cơm cháy Đại Long</p>
                    </div>
                </div>
            </div>
            <div id="chat-container" class="space-y-6"></div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="relative max-w-2xl mx-auto shadow-xl rounded-2xl border border-white overflow-hidden ring-1 ring-slate-200">
                <input type="text" id="userInput" placeholder="Hỏi AI về Ninh Bình..." 
                    class="w-full p-4 pr-16 bg-white focus:outline-none text-[15px]"
                    onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" class="absolute right-2 top-2 bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-emerald-700 transition">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        const translations = {
            vi: {
                welcome: "Chào mừng đến",
                inputPlace: "Hỏi AI về Ninh Bình...",
                sug1: "Thiết kế lịch trình 2 ngày 1 đêm tối ưu check-in 14h và check-out 12h. Ưu tiên Tràng An, Hang Múa, Hoa Lư. Hãy kèm theo hướng dẫn bản đồ.",
                sug1T: "Lịch trình tối ưu",
                sug2: "Gợi ý quán Heo say xỉn, lẩu gà lá é khu Phố cổ và mua quà cơm cháy Đại Long.",
                sug2T: "Ẩm thực & Quà tặng",
                menu: ["Tràng An", "Hang Múa", "Tam Cốc", "Hoa Lư", "Ẩm thực", "Lưu trú"]
            },
            en: {
                welcome: "Welcome to",
                inputPlace: "Ask AI about Ninh Binh...",
                sug1: "Design an optimized 2D1N itinerary (check-in 14:00, check-out 12:00) for Trang An, Hang Mua, Hoa Lu. Include map guidance.",
                sug1T: "Optimized Itinerary",
                sug2: "Suggest Heo Say Xin restaurant and Dai Long crispy rice for souvenirs.",
                sug2T: "Food & Souvenirs",
                menu: ["Trang An", "Hang Mua", "Tam Coc", "Hoa Lu", "Cuisine", "Stay"]
            }
        };

        // Hàm lấy thời tiết thật (Demo đơn giản, bạn có thể thay bằng API Key OpenWeather nếu cần)
        async function fetchWeather() {
            try {
                // Sử dụng dữ liệu mẫu cho Ninh Bình hoặc gọi API công cộng
                const temp = 24 + Math.floor(Math.random() * 5);
                document.getElementById('temp-display').innerText = `${temp}°C | Đẹp`;
            } catch (e) { console.error("Weather error"); }
        }

        window.onload = () => { 
            if (!apiKey) showApiModal(); 
            updateUILanguage(); 
            fetchWeather();
            setInterval(fetchWeather, 600000); 
        };

        function showApiModal() { document.getElementById('api-modal').classList.remove('hidden'); }
        function saveApiKey() { 
            const val = document.getElementById('api-input').value.trim();
            if(val) { apiKey = val; localStorage.setItem('gemini_api_key', val); document.getElementById('api-modal').classList.add('hidden'); }
        }
        function goHome() { 
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('chat-container').innerHTML = ''; 
        }
        function toggleLang() {
            currentLang = currentLang === 'vi' ? 'en' : 'vi';
            document.getElementById('langBtn').innerText = currentLang === 'vi' ? 'EN' : 'VI';
            updateUILanguage();
        }
        function updateUILanguage() {
            const t = translations[currentLang];
            document.getElementById('welcome-text').innerText = t.welcome;
            document.getElementById('userInput').placeholder = t.inputPlace;
            document.getElementById('sug1-title').innerText = t.sug1T;
            document.getElementById('sug2-title').innerText = t.sug2T;
            const menuSpans = document.querySelectorAll('.m-btn');
            t.menu.forEach((text, i) => { if(menuSpans[i]) menuSpans[i].innerText = text; });
        }

        function createMap(locationName) {
            const encodedLoc = encodeURIComponent(locationName + " Ninh Bình");
            return `<div class="map-container shadow-inner">
                <iframe width="100%" height="100%" frameborder="0" style="border:0" 
                    src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_KEY_OPTIONAL&q=${encodedLoc}&zoom=14" 
                    allowfullscreen>
                </iframe>
            </div><p class="text-[10px] text-slate-400 mt-1 italic text-center">Bản đồ mô phỏng vị trí ${locationName}</p>`;
        }

        // Bản đồ dẫn đường tổng hợp (Sử dụng Embed Google Maps cho lộ trình)
        function createRouteMap() {
            return `<div class="map-container">
                <iframe width="100%" height="100%" frameborder="0" style="border:0" 
                    src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d59740.34752661571!2d105.89518501255567!3d20.22676735579997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1zVHLDoG5nIEFuLCBIYW5nIE3DumEsIFBo4buRIEPhu5UgSG9hIEzGsA!5e0!3m2!1svi!2s!4v1711111111111" 
                    allowfullscreen>
                </iframe>
            </div>`;
        }

        async function typeWriter(text, element, isSchedule = false) {
            let i = 0; element.innerHTML = "";
            element.classList.add('typing-cursor');
            return new Promise((resolve) => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 8);
                    } else { 
                        element.classList.remove('typing-cursor'); 
                        if(isSchedule) {
                            element.innerHTML += `<div class="mt-4 p-3 bg-emerald-50 rounded-xl border border-emerald-100 font-bold text-emerald-800 text-[12px]"><i class="fas fa-map-marked-alt mr-2"></i> BẢN ĐỒ LỘ TRÌNH GỢI Ý:</div>`;
                            element.innerHTML += createRouteMap();
                        }
                        resolve(); 
                    }
                }
                type();
            });
        }

        async function askAI(question) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const container = document.getElementById('chat-container');
            const isScheduleRequest = question.includes('lịch trình') || question.includes('itinerary');
            
            container.innerHTML += `<div class="flex justify-end"><div class="bg-emerald-600 text-white p-3 px-5 rounded-2xl rounded-tr-none max-w-[85%] text-[14px] shadow-sm">${question}</div></div>`;
            
            const aiBox = document.createElement('div');
            aiBox.className = "flex justify-start";
            aiBox.innerHTML = `<div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] text-[14px] text-slate-700 leading-relaxed shadow-sm">...</div>`;
            container.appendChild(aiBox);
            const contentElement = aiBox.querySelector('div');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là trợ lý du lịch Ninh Bình. Trả lời bằng ${currentLang}. Quy tắc: Check-in 14:00, Check-out 12:00. Ưu tiên: Tràng An, Hang Múa, Hoa Lư. Ăn tối: Quán Heo say xỉn, Lẩu gà lá é khu Phố cổ Hoa Lư. Quà: Cơm cháy Đại Long (325A Lê Thái Tổ). Hotel: Legend, The Reed, Milan Hotel. Câu hỏi: ${question}` }] }]
                    })
                });
                const data = await response.json();
                await typeWriter(data.candidates[0].content.parts[0].text, contentElement, isScheduleRequest);
            } catch (error) { contentElement.innerText = "Lỗi kết nối API. Vui lòng kiểm tra Key."; }
        }

        function handleSend() {
            const input = document.getElementById('userInput');
            if (input.value.trim()) { askAI(input.value); input.value = ''; }
        }
    </script>
</body>
</html>
