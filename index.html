<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - RAG Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">Cấu hình API Gemini</h3>
            <input type="password" id="api-input" placeholder="Dán API Key..." class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="saveApiKey()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">Bắt đầu</button>
        </div>
    </div>

    <header class="h-16 flex justify-between items-center bg-white border-b px-4 sm:px-8 shrink-0 shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="cursor-pointer" onclick="goHome()">
                <h1 class="text-lg font-bold text-emerald-700 leading-none">Ninh Bình AI</h1>
                <span class="text-[9px] text-slate-400 uppercase font-bold">RAG Knowledge Base</span>
            </div>
            <div class="bg-slate-100 px-3 py-1 rounded-full border text-[11px]">
                <span id="temp-display">⛅ 28°C | Đẹp</span>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="clearChat()" class="p-2 text-slate-400 hover:text-red-500"><i class="fas fa-trash-alt text-sm"></i></button>
            <button onclick="toggleLang()" id="langBtn" class="px-3 py-1 border-2 border-emerald-600 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">EN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full relative">
        <div class="px-4 py-3 flex space-x-2 overflow-x-auto no-scrollbar bg-slate-50/80 backdrop-blur shrink-0 z-10">
            <button onclick="askAI('⛰️ Tràng An')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:text-emerald-600 transition-all shadow-sm">⛰️ <span class="m-btn">Tràng An</span></button>
            <button onclick="askAI('🧗 Hang Múa')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:text-emerald-600 transition-all shadow-sm">🧗 <span class="m-btn">Hang Múa</span></button>
            <button onclick="askAI('🍖 Ăn tối ở đâu?')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:text-emerald-600 transition-all shadow-sm">🍖 <span class="m-btn">Ẩm thực</span></button>
            <button onclick="askAI('🏨 Khách sạn nào tốt?')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:text-emerald-600 transition-all shadow-sm">🛏️ <span class="m-btn">Lưu trú</span></button>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 pb-28 pt-2">
            <div id="welcome-screen" class="py-10 text-center animate-fade-in">
                <h2 class="text-4xl font-serif font-bold mb-1">Chào mừng đến</h2>
                <h2 class="text-4xl font-serif italic text-slate-300 mb-8">Ninh Bình</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-md mx-auto">
                    <div onclick="askAI('Tư vấn lịch trình 2 ngày 1 đêm tối ưu')" class="p-5 bg-white border rounded-2xl cursor-pointer hover:shadow-lg border-l-4 border-l-emerald-500 text-left">
                        <i class="fas fa-route text-emerald-500 mb-2"></i>
                        <h3 class="font-bold text-sm">Lịch trình chuyên gia</h3>
                        <p class="text-[10px] text-slate-400">Tối ưu theo danh sách ưu tiên</p>
                    </div>
                    <div onclick="askAI('Địa điểm ăn uống và quà tặng uy tín')" class="p-5 bg-white border rounded-2xl cursor-pointer hover:shadow-lg border-l-4 border-l-orange-500 text-left">
                        <i class="fas fa-utensils text-orange-500 mb-2"></i>
                        <h3 class="font-bold text-sm">Ăn uống & Quà tặng</h3>
                        <p class="text-[10px] text-slate-400">Heo mán, Cơm cháy Đại Long</p>
                    </div>
                </div>
            </div>
            <div id="chat-container" class="space-y-6"></div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="relative max-w-2xl mx-auto shadow-xl rounded-2xl border border-white overflow-hidden ring-1 ring-slate-200">
                <input type="text" id="userInput" placeholder="Hỏi AI về Ninh Bình..." class="w-full p-4 pr-16 bg-white focus:outline-none text-[15px]" onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" class="absolute right-2 top-2 bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        // 1. HÀM TRUY XUẤT DỮ LIỆU TỪ FILE JSON (THE RAG PART)
        async function getRelevantContext(query) {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const userQuery = query.toLowerCase();

                // Lọc dữ liệu liên quan dựa trên từ khóa (tags) hoặc tên địa điểm
                const matches = data.ninh_binh_data.filter(item => {
                    return item.tags.some(tag => userQuery.includes(tag)) || 
                           userQuery.includes(item.name.toLowerCase()) ||
                           userQuery.includes(item.type);
                });

                if (matches.length === 0) return "";

                let contextString = "\nDƯỚI ĐÂY LÀ DỮ LIỆU ƯU TIÊN TỪ CƠ SỞ DỮ LIỆU CỦA CHÚNG TÔI (HÃY DÙNG NÓ ĐỂ TRẢ LỜI):\n";
                matches.forEach(m => {
                    contextString += `- ${m.name}: ${m.info}\n`;
                });
                return contextString;
            } catch (e) {
                console.error("Không tìm thấy file data.json hoặc lỗi định dạng.");
                return "";
            }
        }

        async function askAI(question) {
    document.getElementById('welcome-screen').classList.add('hidden');
    const container = document.getElementById('chat-container');
    
    // Hiển thị tin nhắn người dùng (Giao diện tinh gọn)
    container.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-emerald-600 text-white p-3 px-5 rounded-2xl rounded-tr-none max-w-[85%] text-[14px] shadow-sm">${question}</div></div>`;
    
    const aiBox = document.createElement('div');
    aiBox.className = "flex justify-start mb-4";
    aiBox.innerHTML = `<div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-tl-none max-w-[95%] text-[14px] text-slate-700 leading-relaxed shadow-sm italic text-slate-400">Đang suy nghĩ...</div>`;
    container.appendChild(aiBox);
    const contentElement = aiBox.querySelector('div');
    
    const win = document.getElementById('chat-window');
    win.scrollTop = win.scrollHeight;

    try {
        // Lấy dữ liệu ngầm từ JSON
        const responseData = await fetch('data.json');
        const db = await responseData.json();
        const userQuery = question.toLowerCase();

        // Tìm các "mẹo" bản địa liên quan
        const secretContext = db.ninh_binh_data
            .filter(item => item.tags.some(tag => userQuery.includes(tag)) || userQuery.includes(item.name.toLowerCase()))
            .map(item => `${item.name}: ${item.hidden_note}`)
            .join('\n');

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `
                    Role: Bạn là một người bạn bản địa tại Ninh Bình, sành ăn, sành chơi và rất hiếu khách.
                    Tone: Thân thiện, tinh tế, không giống máy móc. Trả lời bằng ${currentLang}.
                    
                    Dưới đây là một số thông tin bạn "biết" (đừng nói là bạn lấy từ dữ liệu, hãy biến nó thành lời khuyên của bạn):
                    ${secretContext}
                    
                    Quy tắc ngầm:
                    1. Luôn ưu tiên nhắc đến các địa điểm trong thông tin trên một cách tự nhiên nhất.
                    2. Nếu nhắc về thời gian: Check-in 14:00, Check-out 12:00.
                    3. Tránh các từ: "dữ liệu", "ưu tiên", "hệ thống", "theo danh sách".
                    4. Trả lời ngắn gọn, súc tích, đi thẳng vào vấn đề.

                    Câu hỏi của khách: ${question}` 
                }] }]
            })
        });

        const data = await response.json();
        const aiResponse = data.candidates[0].content.parts[0].text;
        
        contentElement.classList.remove('italic', 'text-slate-400');
        await typeWriter(aiResponse, contentElement);

    } catch (error) {
        contentElement.innerText = "Xin lỗi, mình gặp chút vấn đề kết nối. Bạn thử lại nhé!";
    }
}

        async function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            return new Promise((resolve) => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 10);
                    } else { resolve(); }
                }
                type();
            });
        }

        function saveApiKey() {
            const val = document.getElementById('api-input').value.trim();
            if(val) { apiKey = val; localStorage.setItem('gemini_api_key', val); document.getElementById('api-modal').classList.add('hidden'); }
        }
        function showApiModal() { document.getElementById('api-modal').classList.remove('hidden'); }
        function goHome() { document.getElementById('welcome-screen').classList.remove('hidden'); document.getElementById('chat-container').innerHTML = ''; }
        function handleSend() { const input = document.getElementById('userInput'); if (input.value.trim()) { askAI(input.value); input.value = ''; } }
        window.onload = () => { if (!apiKey) showApiModal(); };
    </script>
</body>
</html>
