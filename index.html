<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - Trợ lý du lịch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="p-4 flex justify-between items-center bg-white border-b">
        <div class="flex items-center space-x-2">
            <h1 class="text-xl font-bold text-emerald-700">Ninh Bình AI</h1>
            <span class="text-xs text-gray-400">TRỢ LÝ DU LỊCH</span>
        </div>
        <div class="flex space-x-2">
            <button onclick="clearChat()" class="p-2 text-red-500 hover:bg-red-50" title="Xóa lịch sử"><i class="fas fa-trash"></i></button>
            <button onclick="changeAPI()" class="p-2 text-amber-500 hover:bg-amber-50" title="Đổi API Key"><i class="fas fa-key"></i></button>
            <button onclick="toggleLang()" id="langBtn" class="px-3 py-1 border rounded hover:bg-gray-100 font-medium">EN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div id="welcome-screen" class="mt-10">
            <h2 class="text-5xl font-serif font-bold mb-2">Chào mừng đến</h2>
            <h2 class="text-5xl font-serif italic text-gray-400 mb-8">Ninh Bình</h2>
            <p class="text-gray-500 mb-10" id="sub-title">Hỏi tôi về địa điểm tham quan, lịch trình, ăn uống... bất kỳ điều gì cho chuyến đi của bạn.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div onclick="askAI('Lịch trình 2 ngày 1 đêm')" class="p-4 bg-white border rounded-xl cursor-pointer hover:shadow-md transition">
                    <i class="fas fa-calendar-alt text-orange-500 mb-2"></i>
                    <h3 class="font-bold">Lịch trình 2 ngày 1 đêm</h3>
                    <p class="text-sm text-gray-400">Cho cặp đôi / gia đình</p>
                </div>
                <div onclick="askAI('Quán ăn ngon tối nay tại Phố cổ')" class="p-4 bg-white border rounded-xl cursor-pointer hover:shadow-md transition">
                    <i class="fas fa-utensils text-red-500 mb-2"></i>
                    <h3 class="font-bold">Đặc sản không bỏ qua</h3>
                    <p class="text-sm text-gray-400">Heo say xỉn, cơm cháy...</p>
                </div>
            </div>
        </div>

        <div id="chat-container" class="hidden mt-6 space-y-4"></div>
    </main>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-white via-white">
        <div class="max-w-4xl mx-auto relative">
            <input type="text" id="userInput" placeholder="Hỏi về địa điểm, lịch trình..." 
                class="w-full p-4 pr-16 border rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="handleSend()" class="absolute right-3 top-3 bg-black text-white p-2 rounded-full w-10 h-10 flex items-center justify-center">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        function changeAPI() {
            const key = prompt("Nhập Gemini API Key của bạn:", apiKey);
            if (key) {
                apiKey = key;
                localStorage.setItem('gemini_api_key', key);
            }
        }

        async function askAI(question) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const container = document.getElementById('chat-container');
            container.classList.remove('hidden');
            
            // Hiển thị câu hỏi của user
            container.innerHTML += `<div class="text-right"><span class="inline-block bg-emerald-100 p-3 rounded-lg">${question}</span></div>`;
            
            if (!apiKey) {
                alert("Vui lòng nhập API Key trước!");
                changeAPI();
                return;
            }

            // Gọi API Gemini (Sử dụng fetch)
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là trợ lý du lịch Ninh Bình. Ngôn ngữ: ${currentLang}. 
                        Quy tắc: Check-in 14h, Check-out 12h. Ưu tiên: Tràng An, Hang Múa, Phố Cổ Hoa Lư. 
                        Ăn uống: Quán Heo say xỉn, Lẩu gà lá é Phố Cổ. Quà: Cơm cháy Đại Long (325A Lê Thái Tổ). 
                        Khách sạn: Legend, The Reed, Milan Hotel. Câu hỏi: ${question}` }] }]
                    })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                container.innerHTML += `<div class="text-left"><span class="inline-block bg-white border p-3 rounded-lg shadow-sm">${aiText.replace(/\n/g, '<br>')}</span></div>`;
            } catch (error) {
                container.innerHTML += `<div class="text-red-500">Lỗi kết nối API. Hãy kiểm tra lại Key.</div>`;
            }
        }

        function clearChat() {
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('welcome-screen').classList.remove('hidden');
        }

        function toggleLang() {
            currentLang = currentLang === 'vi' ? 'en' : 'vi';
            document.getElementById('langBtn').innerText = currentLang === 'vi' ? 'EN' : 'VI';
            // Cập nhật text giao diện tùy theo ngôn ngữ tại đây
        }

        function handleSend() {
            const input = document.getElementById('userInput');
            if (input.value) {
                askAI(input.value);
                input.value = '';
            }
        }
    </script>
</body>
</html>
