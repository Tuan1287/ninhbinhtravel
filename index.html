<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - Chuyên gia bản địa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-color: #f8fafc; }
        main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .map-container { width: 100%; height: 300px; border-radius: 16px; overflow: hidden; margin-top: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-800 font-sans">

    <header class="h-16 flex justify-between items-center bg-white border-b px-4 sm:px-8 shrink-0 shadow-sm z-50">
        <div class="flex items-center space-x-4">
            <div class="cursor-pointer" onclick="goHome()">
                <h1 class="text-lg font-bold text-emerald-700 leading-none">Ninh Bình AI</h1>
                <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Local Expert</span>
            </div>
            <div class="flex items-center bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
                <span id="weather-icon" class="text-base mr-2">⛅</span>
                <div class="text-[10px] leading-tight">
                    <div class="font-bold text-slate-600">Ninh Bình</div>
                    <div id="temp-display" class="text-emerald-600 font-medium">26°C | Trong lành</div>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="clearChat()" class="p-2 text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-sm"></i></button>
            <button onclick="toggleLang()" id="langBtn" class="px-3 py-1 border-2 border-emerald-600 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">EN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full relative">
        <div class="px-4 py-3 flex space-x-2 overflow-x-auto no-scrollbar bg-slate-50/80 backdrop-blur shrink-0 z-10">
            <button onclick="askAI('⛰️ Tràng An')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 transition-all shadow-sm">⛰️ <span class="m-btn">Tràng An</span></button>
            <button onclick="askAI('🧗 Hang Múa')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 transition-all shadow-sm">🧗 <span class="m-btn">Hang Múa</span></button>
            <button onclick="askAI('🍗 Ăn tối ở đâu ngon?')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 transition-all shadow-sm">🍖 <span class="m-btn">Ẩm thực</span></button>
            <button onclick="askAI('🏨 Khách sạn nào tốt?')" class="flex-none px-4 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 transition-all shadow-sm">🛏️ <span class="m-btn">Lưu trú</span></button>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 pb-32 pt-2">
            <div id="welcome-screen" class="py-12 text-center animate-fade-in">
                <h2 class="text-4xl font-serif font-bold mb-2">Chào mừng đến</h2>
                <h2 class="text-4xl font-serif italic text-slate-200 mb-10">Ninh Bình</h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-md mx-auto">
                    <div onclick="askAI('Gợi ý lịch trình 2 ngày 1 đêm tối ưu nhất')" class="p-5 bg-white border rounded-2xl cursor-pointer hover:shadow-lg border-l-4 border-l-emerald-500 text-left transition-all">
                        <i class="fas fa-map-marked-alt text-emerald-500 mb-2 text-xl"></i>
                        <h3 class="font-bold text-sm">Lịch trình tối ưu</h3>
                        <p class="text-[10px] text-slate-400 mt-1">Kèm bản đồ dẫn đường bộ</p>
                    </div>
                    <div onclick="askAI('Nên ăn tối ở đâu và mua gì làm quà?')" class="p-5 bg-white border rounded-2xl cursor-pointer hover:shadow-lg border-l-4 border-l-orange-500 text-left transition-all">
                        <i class="fas fa-utensils text-orange-500 mb-2 text-xl"></i>
                        <h3 class="font-bold text-sm">Ăn uống & Quà tặng</h3>
                        <p class="text-[10px] text-slate-400 mt-1">Gợi ý từ người bản địa</p>
                    </div>
                </div>
            </div>
            <div id="chat-container" class="space-y-6"></div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="relative max-w-2xl mx-auto shadow-xl rounded-2xl border border-white overflow-hidden ring-1 ring-slate-200">
                <input type="text" id="userInput" placeholder="Nhập câu hỏi của bạn..." 
                    class="w-full p-4 pr-16 bg-white focus:outline-none text-[14px]"
                    onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" class="absolute right-2 top-2 bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-emerald-700 transition">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        // 1. Tích hợp RAG ngầm
        async function getSecretContext(query) {
            try {
                const res = await fetch('data.json');
                const db = await res.json();
                const q = query.toLowerCase();
                return db.ninh_binh_data
                    .filter(i => i.tags.some(t => q.includes(t)) || q.includes(i.name.toLowerCase()))
                    .map(i => `${i.name}: ${i.hidden_note}`).join('\n');
            } catch (e) { return ""; }
        }

        // 2. Hàm tạo Bản đồ
        function createMapIframe() {
            // Tọa độ trung tâm Ninh Bình (Tràng An - Hang Múa)
            return `<div class="map-container">
                <iframe width="100%" height="100%" frameborder="0" style="border:0" 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d59781.18386375003!2d105.87522432167967!3d20.22565690000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x313679693e506691%3A0x8979a0b9432e1a3d!2zVHLDoG5nIEFu!5e0!3m2!1svi!2s!4v1710000000000!5m2!1svi!2s" 
                    allowfullscreen>
                </iframe>
            </div>`;
        }

        async function askAI(question) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const container = document.getElementById('chat-container');
            const isMapNeeded = question.toLowerCase().includes('lịch trình') || question.toLowerCase().includes('đường đi') || question.toLowerCase().includes('itinerary');
            
            container.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-emerald-600 text-white p-3 px-5 rounded-2xl rounded-tr-none max-w-[85%] text-[14px] shadow-sm">${question}</div></div>`;
            
            const aiBox = document.createElement('div');
            aiBox.className = "flex justify-start mb-4";
            aiBox.innerHTML = `<div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] text-[14px] text-slate-700 leading-relaxed shadow-sm italic text-slate-300">Đang suy nghĩ...</div>`;
            container.appendChild(aiBox);
            const contentElement = aiBox.querySelector('div');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;

            try {
                const secretContext = await getSecretContext(question);

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là người bạn bản địa Ninh Bình hiếu khách. Trả lời bằng ${currentLang}.
                        Dưới đây là mẹo bản địa bạn "biết" (đừng nói là lấy từ đâu, hãy tư vấn tự nhiên):
                        ${secretContext}
                        Lưu ý: Check-in 14h, Check-out 12h. Tránh dùng từ "ưu tiên", "hệ thống".
                        Nếu khách hỏi lịch trình, hãy nhắc họ xem bản đồ lộ trình bạn gửi kèm bên dưới.
                        Câu hỏi: ${question}` }] }]
                    })
                });
                
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                contentElement.classList.remove('italic', 'text-slate-300');
                await typeWriter(aiText, contentElement);

                if (isMapNeeded) {
                    contentElement.innerHTML += `<div class="mt-4 pt-4 border-t border-slate-100 font-bold text-emerald-700 text-[12px]"><i class="fas fa-map-marked-alt mr-2"></i> LỘ TRÌNH GỢI Ý (BẢN ĐỒ DẪN ĐƯỜNG):</div>`;
                    contentElement.innerHTML += createMapIframe();
                    win.scrollTop = win.scrollHeight;
                }
            } catch (error) { contentElement.innerText = "Lỗi kết nối. Vui lòng kiểm tra API Key."; }
        }

        async function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            return new Promise((resolve) => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 8);
                    } else { resolve(); }
                }
                type();
            });
        }

        function handleSend() {
            const input = document.getElementById('userInput');
            if (input.value.trim()) { askAI(input.value); input.value = ''; }
        }
        function goHome() { document.getElementById('welcome-screen').classList.remove('hidden'); document.getElementById('chat-container').innerHTML = ''; }
        function toggleLang() { currentLang = currentLang === 'vi' ? 'en' : 'vi'; document.getElementById('langBtn').innerText = currentLang === 'vi' ? 'EN' : 'VI'; }
        function clearChat() { if(confirm("Xóa hội thoại?")) goHome(); }
        window.onload = () => { if (!apiKey) { const key = prompt("Nhập API Key Gemini:"); if(key) { apiKey = key; localStorage.setItem('gemini_api_key', key); } } };
    </script>
</body>
</html>
