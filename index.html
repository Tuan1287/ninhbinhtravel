<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - Local Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-color: #f8fafc; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .map-container { width: 100%; height: 280px; border-radius: 16px; overflow: hidden; margin-top: 10px; border: 1px solid #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800">

    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] hidden p-4">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-lg font-bold mb-4" id="modal-title">Cấu hình API Gemini</h3>
            <input type="password" id="api-input" placeholder="Dán API Key..." 
                class="w-full p-4 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-emerald-500 text-center">
            <button onclick="saveApiKey()" class="w-full bg-emerald-600 text-white py-3.5 rounded-2xl font-bold hover:bg-emerald-700 transition-all">Bắt đầu ngay</button>
        </div>
    </div>

    <header class="h-16 flex justify-between items-center bg-white border-b px-4 sm:px-8 shrink-0 shadow-sm z-50">
        <div class="flex items-center space-x-3">
            <div class="cursor-pointer" onclick="goHome()">
                <h1 class="text-base font-bold text-emerald-700 leading-none">Ninh Bình AI</h1>
                <span class="text-[8px] text-slate-400 uppercase font-bold tracking-tighter" id="header-tag">Local Guide</span>
            </div>
            <div class="flex items-center bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100 shadow-sm">
                <span class="text-sm mr-1.5">⛅</span>
                <div id="temp-display" class="text-[10px] font-bold text-emerald-700 uppercase">26°C | Đẹp</div>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="clearChat()" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="Xóa hội thoại">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button onclick="showApiModal()" class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition" title="Đổi API">
                <i class="fas fa-key"></i>
            </button>
            <button onclick="toggleLang()" id="langBtn" class="ml-2 px-3 py-1 border-2 border-emerald-600 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">EN</button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto w-full relative flex-1 flex flex-col overflow-hidden">
        <div id="chat-window" class="flex-1 overflow-y-auto px-4 pt-4 pb-32">
            <div id="welcome-screen" class="py-10 text-center">
                <h2 class="text-3xl font-bold mb-8 text-slate-900" id="welcome-text">Bạn cần hỗ trợ gì tại Ninh Bình?</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div onclick="askAI(translations[currentLang].sug1)" class="p-5 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-emerald-500 hover:shadow-md transition-all text-left">
                        <i class="fas fa-map-marked-alt text-emerald-600 mb-2"></i>
                        <h3 class="font-bold text-sm" id="sug1-title">Lịch trình 2N1Đ</h3>
                        <p class="text-[10px] text-slate-400 mt-1" id="sug1-desc">Kèm bản đồ chỉ đường bộ.</p>
                    </div>
                    <div onclick="askAI(translations[currentLang].sug2)" class="p-5 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:border-orange-500 hover:shadow-md transition-all text-left">
                        <i class="fas fa-utensils text-orange-500 mb-2"></i>
                        <h3 class="font-bold text-sm" id="sug2-title">Ăn uống & Đặc sản</h3>
                        <p class="text-[10px] text-slate-400 mt-1" id="sug2-desc">Địa điểm từ dân bản địa.</p>
                    </div>
                </div>
            </div>
            <div id="chat-container" class="space-y-6"></div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="relative max-w-2xl mx-auto shadow-xl rounded-2xl border border-white overflow-hidden bg-white ring-1 ring-slate-200">
                <input type="text" id="userInput" placeholder="Hỏi mình..." 
                    class="w-full p-4 pr-16 focus:outline-none text-sm"
                    onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" class="absolute right-2 top-2 bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        const translations = {
            vi: {
                welcome: "Bạn cần hỗ trợ gì tại Ninh Bình?",
                inputPlace: "Hỏi mình bất cứ điều gì...",
                headerTag: "Chuyên gia bản địa",
                sug1: "Lịch trình 2 ngày 1 đêm tối ưu, check-in 14h, check-out 12h, có bản đồ.",
                sug1T: "Lịch trình 2N1Đ",
                sug1D: "Kèm bản đồ chỉ đường bộ.",
                sug2: "Gợi ý quán ăn tối và quà tặng cơm cháy uy tín.",
                sug2T: "Ăn uống & Đặc sản",
                sug2D: "Địa điểm từ dân bản địa.",
                thinking: "Đang xử lý...",
                mapBtn: "Mở trên Google Maps"
            },
            en: {
                welcome: "How can I help you in Ninh Binh?",
                inputPlace: "Ask me anything...",
                headerTag: "Local Expert",
                sug1: "Optimized 2D1N itinerary, check-in 14:00, check-out 12:00, with map.",
                sug1T: "2D1N Itinerary",
                sug1D: "Includes road map guidance.",
                sug2: "Recommend dinner places and reputable crispy rice souvenirs.",
                sug2T: "Food & Souvenirs",
                sug2D: "Local-recommended spots.",
                thinking: "Thinking...",
                mapBtn: "Open in Google Maps"
            }
        };

        function updateUILanguage() {
            const t = translations[currentLang];
            document.getElementById('welcome-text').innerText = t.welcome;
            document.getElementById('userInput').placeholder = t.inputPlace;
            document.getElementById('header-tag').innerText = t.headerTag;
            document.getElementById('sug1-title').innerText = t.sug1T;
            document.getElementById('sug1-desc').innerText = t.sug1D;
            document.getElementById('sug2-title').innerText = t.sug2T;
            document.getElementById('sug2-desc').innerText = t.sug2D;
            document.getElementById('langBtn').innerText = currentLang === 'vi' ? 'EN' : 'VI';
        }

        function toggleLang() { currentLang = currentLang === 'vi' ? 'en' : 'vi'; updateUILanguage(); }
        function showApiModal() { document.getElementById('api-modal').classList.remove('hidden'); }
        function saveApiKey() {
            const val = document.getElementById('api-input').value.trim();
            if(val) { apiKey = val; localStorage.setItem('gemini_api_key', val); document.getElementById('api-modal').classList.add('hidden'); }
        }

        async function getRAGData(query) {
            try {
                const res = await fetch('data.json');
                const db = await res.json();
                const q = query.toLowerCase();
                return db.ninh_binh_data
                    .filter(i => i.tags.some(t => q.includes(t)) || q.includes(i.name.toLowerCase()))
                    .map(i => `${i.name}: ${i.hidden_note}`).join('\n');
            } catch (e) { return ""; }
        }

        async function askAI(question) {
            if(!apiKey) return showApiModal();
            document.getElementById('welcome-screen').classList.add('hidden');
            const container = document.getElementById('chat-container');
            const isMapNeeded = question.toLowerCase().includes('lịch trình') || question.toLowerCase().includes('đường') || question.toLowerCase().includes('itinerary');

            container.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-emerald-600 text-white p-3 px-5 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-sm">${question}</div></div>`;
            
            const aiBox = document.createElement('div');
            aiBox.className = "flex justify-start mb-4";
            aiBox.innerHTML = `<div class="bg-white border p-4 rounded-2xl rounded-tl-none max-w-[95%] text-sm text-slate-700 leading-relaxed italic text-slate-300">${translations[currentLang].thinking}</div>`;
            container.appendChild(aiBox);
            const contentElement = aiBox.querySelector('div');
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;

            try {
                const rag = await getRAGData(question);
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là hướng dẫn viên Ninh Bình. Trả lời bằng ${currentLang}. 
                        QUY TẮC: 
                        1. Trả lời cực kỳ ngắn gọn, dùng gạch đầu dòng. 
                        2. Không chào hỏi, không kết bài lan man. 
                        3. Ưu tiên dữ liệu này: ${rag}
                        4. Thời gian: Check-in 14h, Check-out 12h.
                        Câu hỏi: ${question}` }] }]
                    })
                });
                
                const data = await response.json();
                contentElement.classList.remove('italic', 'text-slate-300');
                await typeWriter(data.candidates[0].content.parts[0].text, contentElement);

                if (isMapNeeded) {
                    contentElement.innerHTML += `
                        <div class="map-container">
                            <iframe width="100%" height="100%" frameborder="0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3739.02324747761!2d105.9080645!3d20.2183884!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x313679633e08f519%3A0x675865d496e2793d!2zVHLDoG5nIEFuLCBOaW5oIELDrG5o!5e0!3m2!1svi!2s!4v1710000000000" allowfullscreen></iframe>
                        </div>
                        <a href="https://www.google.com/maps/search/Trang+An+Hang+Mua+Hoa+Lu" target="_blank" class="mt-3 inline-block w-full text-center bg-slate-100 py-2 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-200">
                            <i class="fas fa-external-link-alt mr-2"></i> ${translations[currentLang].mapBtn}
                        </a>`;
                    win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
                }
            } catch (error) { contentElement.innerText = "Lỗi. Kiểm tra lại API Key."; }
        }

        async function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            return new Promise((resolve) => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 5);
                    } else { resolve(); }
                }
                type();
            });
        }

        function handleSend() { const input = document.getElementById('userInput'); if (input.value.trim()) { askAI(input.value); input.value = ''; } }
        function goHome() { document.getElementById('welcome-screen').classList.remove('hidden'); document.getElementById('chat-container').innerHTML = ''; }
        function clearChat() { if(confirm("Xóa chat?")) goHome(); }
        window.onload = () => { updateUILanguage(); if (!apiKey) showApiModal(); };
    </script>
</body>
</html>
