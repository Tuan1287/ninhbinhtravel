<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninh Bình AI - Trợ lý du lịch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tối ưu thanh cuộn cho khung chat */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #chat-window::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        .typing-cursor::after { content: "|"; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Khống chế chiều cao màn hình để không phải cuộn cả trang */
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="api-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">Cấu hình API Gemini</h3>
            <input type="password" id="api-input" placeholder="Dán API Key vào đây..." 
                class="w-full p-3 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="saveApiKey()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">Bắt đầu</button>
        </div>
    </div>

    <header class="h-14 flex justify-between items-center bg-white border-b px-4 sm:px-8 shrink-0">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="goHome()">
            <h1 class="text-lg font-bold text-emerald-700 tracking-tight">Ninh Bình AI</h1>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="clearChat()" class="p-2 text-slate-400 hover:text-red-500 transition"><i class="fas fa-trash-alt text-sm"></i></button>
            <button onclick="showApiModal()" class="p-2 text-slate-400 hover:text-amber-500 transition"><i class="fas fa-key text-sm"></i></button>
            <button onclick="toggleLang()" id="langBtn" class="ml-2 px-3 py-1 border-2 border-emerald-600 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">EN</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full relative">
        <div class="px-4 py-3 flex space-x-2 overflow-x-auto no-scrollbar bg-slate-50/80 backdrop-blur shrink-0">
            <button onclick="askAI('⛰️ Tràng An')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">⛰️ <span class="m-btn">Tràng An</span></button>
            <button onclick="askAI('🧗 Hang Múa')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">🧗 <span class="m-btn">Hang Múa</span></button>
            <button onclick="askAI('🛶 Tam Cốc')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">🛶 <span class="m-btn">Tam Cốc</span></button>
            <button onclick="askAI('🏛️ Hoa Lư')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">🏛️ <span class="m-btn">Hoa Lư</span></button>
            <button onclick="askAI('🍗 Ẩm thực')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">🍖 <span class="m-btn">Ẩm thực</span></button>
            <button onclick="askAI('🏨 Lưu trú')" class="flex-none px-3 py-1.5 bg-white border rounded-full text-xs font-medium hover:border-emerald-500 hover:text-emerald-600 shadow-sm transition-all">🛏️ <span class="m-btn">Lưu trú</span></button>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto px-4 pb-24 pt-2">
            <div id="welcome-screen" class="py-10 text-center animate-fade-in">
                <h2 class="text-4xl font-serif font-bold mb-1" id="welcome-text">Chào mừng đến</h2>
                <h2 class="text-4xl font-serif italic text-slate-300 mb-6">Ninh Bình</h2>
                <p class="text-slate-500 text-sm mb-8 px-6" id="sub-title">Hỏi tôi về bất kỳ điều gì cho chuyến đi của bạn.</p>
                
                <div class="grid grid-cols-2 gap-3 px-2">
                    <div onclick="askAI(translations[currentLang].sug1)" class="p-4 bg-white border border-slate-100 rounded-2xl cursor-pointer hover:shadow-md transition-all">
                        <i class="fas fa-map-marked-alt text-orange-500 mb-2"></i>
                        <h3 class="font-bold text-xs" id="sug1-title">Lịch trình 2N1Đ</h3>
                    </div>
                    <div onclick="askAI(translations[currentLang].sug2)" class="p-4 bg-white border border-slate-100 rounded-2xl cursor-pointer hover:shadow-md transition-all">
                        <i class="fas fa-utensils text-red-500 mb-2"></i>
                        <h3 class="font-bold text-xs" id="sug2-title">Ăn gì buổi tối?</h3>
                    </div>
                </div>
            </div>

            <div id="chat-container" class="space-y-4"></div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="relative max-w-2xl mx-auto shadow-xl rounded-2xl border border-white overflow-hidden">
                <input type="text" id="userInput" placeholder="Hỏi AI về Ninh Bình..." 
                    class="w-full p-4 pr-16 bg-white focus:outline-none text-sm"
                    onkeypress="if(event.key === 'Enter') handleSend()">
                <button onclick="handleSend()" class="absolute right-2 top-2 bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-emerald-700 transition shadow-sm">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let currentLang = 'vi';

        const translations = {
            vi: {
                welcome: "Chào mừng đến",
                sub: "Hỏi tôi về địa điểm tham quan, lịch trình, ăn uống...",
                inputPlace: "Hỏi AI về Ninh Bình...",
                sug1: "Thiết kế lịch trình 2 ngày 1 đêm ưu tiên Tràng An, Hang Múa, Hoa Lư. Chú ý check-in/out.",
                sug1T: "Lịch trình 2 ngày 1 đêm",
                sug2: "Gợi ý quán ăn buổi tối tại Phố cổ Hoa Lư và quà cơm cháy",
                sug2T: "Ăn gì buổi tối?",
                error: "Lỗi kết nối. Vui lòng kiểm tra API Key.",
                menu: ["Tràng An", "Hang Múa", "Tam Cốc", "Hoa Lư", "Ẩm thực", "Lưu trú"]
            },
            en: {
                welcome: "Welcome to",
                sub: "Ask me about sightseeing, itineraries, food...",
                inputPlace: "Ask AI about Ninh Binh...",
                sug1: "Design a 2D1N itinerary for Trang An, Hang Mua, Hoa Lu. Mind the check-in times.",
                sug1T: "2D1N Itinerary",
                sug2: "Dinner ideas in Hoa Lu Ancient Town and souvenir tips",
                sug2T: "Where to eat?",
                error: "Connection error. Please check your API Key.",
                menu: ["Trang An", "Hang Mua", "Tam Coc", "Hoa Lu", "Cuisine", "Stay"]
            }
        };

        window.onload = () => { if (!apiKey) showApiModal(); updateUILanguage(); };
        function showApiModal() { document.getElementById('api-modal').classList.remove('hidden'); }
        function saveApiKey() { 
            const val = document.getElementById('api-input').value.trim();
            if(val) { apiKey = val; localStorage.setItem('gemini_api_key', val); document.getElementById('api-modal').classList.add('hidden'); }
        }
        function goHome() { 
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('chat-container').innerHTML = ''; 
        }
        function toggleLang() {
            currentLang = currentLang === 'vi' ? 'en' : 'vi';
            document.getElementById('langBtn').innerText = currentLang === 'vi' ? 'EN' : 'VI';
            updateUILanguage();
        }
        function updateUILanguage() {
            const t = translations[currentLang];
            document.getElementById('welcome-text').innerText = t.welcome;
            document.getElementById('sub-title').innerText = t.sub;
            document.getElementById('userInput').placeholder = t.inputPlace;
            document.getElementById('sug1-title').innerText = t.sug1T;
            document.getElementById('sug2-title').innerText = t.sug2T;
            const menuSpans = document.querySelectorAll('.m-btn');
            t.menu.forEach((text, i) => { if(menuSpans[i]) menuSpans[i].innerText = text; });
        }

        async function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            element.classList.add('typing-cursor');
            return new Promise((resolve) => {
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                        const win = document.getElementById('chat-window');
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 10);
                    } else { element.classList.remove('typing-cursor'); resolve(); }
                }
                type();
            });
        }

        async function askAI(question) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const container = document.getElementById('chat-container');
            
            container.innerHTML += `<div class="flex justify-end"><div class="bg-emerald-600 text-white p-3 px-4 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-sm">${question}</div></div>`;
            
            const aiBox = document.createElement('div');
            aiBox.className = "flex justify-start";
            aiBox.innerHTML = `<div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-tl-none max-w-[90%] text-sm text-slate-700 leading-relaxed shadow-sm">...</div>`;
            container.appendChild(aiBox);
            const contentElement = aiBox.querySelector('div');
            
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;

            try {
                // SỬ DỤNG MODEL GEMINI 2.5 FLASH NHƯ BIỂU ĐỒ CỦA BẠN
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là chuyên gia du lịch Ninh Bình. Trả lời bằng ${currentLang}. Quy tắc: Check-in 14:00, Check-out 12:00. Ưu tiên: Tràng An, Hang Múa, Hoa Lư. Ăn tối: Quán Heo say xỉn, Lẩu gà lá é khu Phố cổ Hoa Lư. Quà: Cơm cháy Đại Long (325A Lê Thái Tổ). Hotel: Legend, The Reed, Milan Hotel. Câu hỏi: ${question}` }] }]
                    })
                });
                const data = await response.json();
                if (data.error) { contentElement.innerText = "Lỗi: " + data.error.message; return; }
                await typeWriter(data.candidates[0].content.parts[0].text, contentElement);
            } catch (error) { contentElement.innerText = translations[currentLang].error; }
        }

        function handleSend() {
            const input = document.getElementById('userInput');
            if (input.value.trim()) { askAI(input.value); input.value = ''; }
        }

        function clearChat() { if(confirm("Xóa hội thoại?")) goHome(); }
    </script>
</body>
</html>
